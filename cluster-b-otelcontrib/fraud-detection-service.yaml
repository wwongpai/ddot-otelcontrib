apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
  namespace: bankflow
  labels:
    app: fraud-detection-service
    tags.datadoghq.com/env: otel-demo
    tags.datadoghq.com/service: fraud-detection-oss
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
        tags.datadoghq.com/env: otel-demo
        tags.datadoghq.com/service: fraud-detection-oss
        tags.datadoghq.com/version: "1.0.0"
    spec:
      containers:
        - name: fraud-detection-service
          image: docker.io/wwongpai/fraud-detection-service:v6
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "fraud-detection-oss"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=otel-demo,service.version=1.0.0,team=platform"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
  namespace: bankflow
  labels:
    app: fraud-detection-service
spec:
  type: ClusterIP
  selector:
    app: fraud-detection-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
