apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: bankflow
  labels:
    app: account-service
    tags.datadoghq.com/env: otel-demo
    tags.datadoghq.com/service: account-service-oss
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
        tags.datadoghq.com/env: otel-demo
        tags.datadoghq.com/service: account-service-oss
        tags.datadoghq.com/version: "1.0.0"
    spec:
      containers:
        - name: account-service
          image: docker.io/wwongpai/account-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "account-service-oss"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=otel-demo,service.version=1.0.0,team=platform"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: bankflow
  labels:
    app: account-service
spec:
  type: ClusterIP
  selector:
    app: account-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
