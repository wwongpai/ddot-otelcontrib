mode: daemonset
image:
  repository: otel/opentelemetry-collector-contrib

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  kubeletMetrics:
    enabled: true
  hostMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: false

extraEnvs:
  - name: DD_API_KEY
    valueFrom:
      secretKeyRef:
        name: datadog-secret
        key: DD_API_KEY

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1000
    memory_limiter:
      limit_mib: 512
      check_interval: 5s
    resourcedetection:
      detectors: [gcp, env, system]
      timeout: 5s
      override: false

  extensions:
    datadog:
      api:
        key: ${env:DD_API_KEY}
        site: datadoghq.com
      deployment_type: daemonset

  exporters:
    datadog:
      api:
        key: ${env:DD_API_KEY}
        site: datadoghq.com
      traces:
        compute_stats_by_span_kind: true
        peer_tags_aggregation: true
      host_metadata:
        enabled: true

  service:
    extensions: [health_check, datadog]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [datadog]
      metrics:
        receivers: [otlp, kubeletstats, hostmetrics]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [datadog]
      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, k8sattributes, resourcedetection, batch]
        exporters: [datadog]

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP

tolerations:
  - operator: Exists

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 100m
